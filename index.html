<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Daily Standup Planner</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --ink:#111;--ink2:#555;--ink3:#999;
  --surface:#fff;--surface2:#f7f6f3;--surface3:#efede8;
  --border:#e5e2db;--border2:#ccc;
  --green:#2d7a4f;--green-bg:#eaf4ee;
  --blue:#1a5fa8;--blue-bg:#e8f0fa;
  --amber:#8a5a00;--amber-bg:#fdf3dc;
  --red:#a02020;--red-bg:#fdeaea;
  --purple:#4a3aaa;--purple-bg:#eeecfb;
  --r:10px;--rsm:6px;
}
body{font-family:'DM Sans',sans-serif;background:var(--surface2);color:var(--ink);min-height:100vh}

#login-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:2rem}
.login-card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:2.5rem 2rem;width:100%;max-width:440px;text-align:center}
.login-card h1{font-size:20px;font-weight:600;margin-bottom:6px;letter-spacing:-.3px}
.login-card p{font-size:13px;color:var(--ink3);margin-bottom:2rem}
.dev-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:1.25rem}
.dev-pick{padding:12px 10px;border:1px solid var(--border);border-radius:var(--r);cursor:pointer;background:var(--surface2);transition:all .15s;display:flex;flex-direction:column;align-items:center;gap:6px}
.dev-pick:hover{border-color:var(--border2);background:var(--surface)}
.dev-pick.selected{border-color:var(--ink);background:var(--ink);color:#fff}
.dev-pick .av{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;font-family:'DM Mono',monospace}
.dev-pick .dname{font-size:13px;font-weight:500}
.dev-pick.selected .av{background:rgba(255,255,255,.15)!important;color:#fff!important}
.divider{display:flex;align-items:center;gap:8px;margin-bottom:1.25rem;color:var(--ink3);font-size:12px}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--border)}
.lead-btn{width:100%;padding:10px;border:1px dashed var(--border2);border-radius:var(--r);background:transparent;font-family:'DM Sans',sans-serif;font-size:13px;color:var(--ink2);cursor:pointer;transition:all .15s}
.lead-btn:hover{background:var(--surface3)}
.btn-enter{width:100%;margin-top:1.25rem;padding:11px;background:var(--ink);color:#fff;border:none;border-radius:var(--r);font-family:'DM Sans',sans-serif;font-size:14px;font-weight:500;cursor:pointer;transition:opacity .15s}
.btn-enter:hover{opacity:.85}
.btn-enter:disabled{opacity:.35;cursor:default}

#app{display:none;min-height:100vh;flex-direction:column}
.topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:0 1.5rem;display:flex;align-items:center;gap:12px;height:52px;position:sticky;top:0;z-index:10}
.topbar-title{font-size:15px;font-weight:600;flex:1;letter-spacing:-.2px}
.topbar-date{font-size:12px;color:var(--ink3);font-family:'DM Mono',monospace}
.sync-dot{width:8px;height:8px;border-radius:50%;background:#ccc;flex-shrink:0;transition:background .3s}
.sync-dot.ok{background:var(--green)}.sync-dot.err{background:var(--red)}
.sync-dot.loading{background:var(--amber);animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.sync-lbl{font-size:11px;color:var(--ink3)}
.user-pill{display:flex;align-items:center;gap:7px;padding:5px 10px;border:1px solid var(--border);border-radius:20px;font-size:12px;font-weight:500;cursor:pointer;background:var(--surface2)}
.user-pill:hover{background:var(--surface3)}
.av-sm{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:600;font-family:'DM Mono',monospace}
.tab-bar{background:var(--surface);border-bottom:1px solid var(--border);padding:0 1.5rem;display:flex;overflow-x:auto}
.tb{padding:12px 16px;border:none;background:transparent;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;color:var(--ink3);cursor:pointer;border-bottom:2px solid transparent;transition:all .15s;white-space:nowrap;flex-shrink:0}
.tb.on{color:var(--ink);border-bottom-color:var(--ink)}
.tb:hover:not(.on){color:var(--ink2)}
.content{flex:1;padding:1.5rem;max-width:960px;margin:0 auto;width:100%}
.section-label{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.8px;color:var(--ink3);margin-bottom:12px}
.view{display:none}.view.on{display:block}

.add-bar{display:flex;gap:8px;margin-bottom:1.5rem;background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:10px 12px;align-items:center;flex-wrap:wrap}
.add-bar input{flex:1;min-width:150px;border:none;font-size:14px;font-family:'DM Sans',sans-serif;background:transparent;color:var(--ink);outline:none}
.add-bar input::placeholder{color:var(--ink3)}
.add-bar select{border:1px solid var(--border);border-radius:var(--rsm);padding:5px 10px;font-size:12px;font-family:'DM Sans',sans-serif;background:var(--surface2);color:var(--ink);cursor:pointer;outline:none}
.btn-add{background:var(--ink);color:#fff;border:none;border-radius:var(--rsm);padding:6px 14px;font-size:13px;font-family:'DM Sans',sans-serif;font-weight:500;cursor:pointer;white-space:nowrap}
.btn-add:hover{opacity:.8}

.dev-section{margin-bottom:1.5rem}
.dev-hdr{display:flex;align-items:center;gap:10px;margin-bottom:10px;padding-bottom:8px;border-bottom:1px solid var(--border)}
.av{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;flex-shrink:0;font-family:'DM Mono',monospace}
.dev-name-lbl{font-size:14px;font-weight:600}
.dev-meta{font-size:12px;color:var(--ink3);margin-left:auto;font-family:'DM Mono',monospace}
.prog-bar-wrap{height:4px;background:var(--border);border-radius:2px;overflow:hidden;margin-top:4px}
.prog-bar-fill{height:100%;border-radius:2px;background:var(--green);transition:width .4s}

.task-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:12px 14px;margin-bottom:8px;display:flex;gap:12px;align-items:flex-start;transition:border-color .15s}
.task-card:hover{border-color:var(--border2)}
.task-card.done-card{opacity:.55}
.task-card.priority-high{border-left:3px solid #e53e3e}
.task-card.priority-medium{border-left:3px solid #e6a817}
.task-card.priority-low{border-left:3px solid #2d7a4f}
.task-left{flex:1;min-width:0}
.task-title{font-size:13px;font-weight:500;word-break:break-word;line-height:1.45}
.task-mod{font-size:11px;color:var(--ink3);font-family:'DM Mono',monospace;margin-top:2px}
.task-tags{display:flex;gap:5px;flex-wrap:wrap;margin-top:7px}
.tag{font-size:11px;padding:2px 8px;border-radius:20px;font-weight:500;white-space:nowrap}
.t-high{background:#fdeaea;color:#a02020}.t-medium{background:#fdf3dc;color:#8a5a00}.t-low{background:#eaf4ee;color:#2d7a4f}
.t-eod{background:#e8f0fa;color:#1a5fa8}.t-tbd{background:var(--surface3);color:var(--ink2)}.t-other{background:var(--purple-bg);color:var(--purple)}
.t-done{background:var(--green-bg);color:var(--green)}.t-prog{background:var(--blue-bg);color:var(--blue)}.t-block{background:var(--red-bg);color:var(--red)}
.remove-btn{width:24px;height:24px;border:none;background:transparent;color:var(--ink3);cursor:pointer;font-size:18px;border-radius:4px;flex-shrink:0;display:flex;align-items:center;justify-content:center}
.remove-btn:hover{color:var(--ink);background:var(--surface2)}

.prog-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:14px 16px;margin-bottom:10px}
.prog-card.priority-high{border-left:3px solid #e53e3e}
.prog-card.priority-medium{border-left:3px solid #e6a817}
.prog-card.priority-low{border-left:3px solid #2d7a4f}
.prog-top{display:flex;align-items:flex-start;gap:10px;margin-bottom:12px;flex-wrap:wrap}
.prog-title{font-size:13px;font-weight:500;flex:1;min-width:140px;line-height:1.4}
.prog-sub{font-size:11px;color:var(--ink3);font-family:'DM Mono',monospace;margin-top:2px}
.status-row{display:flex;gap:4px;flex-wrap:wrap}
.sp{font-size:11px;padding:4px 10px;border-radius:20px;cursor:pointer;border:1.5px solid transparent;font-family:'DM Sans',sans-serif;font-weight:500;transition:all .1s}

.comment-thread{border-top:1px solid var(--border);padding-top:12px}
.no-comments{font-size:12px;color:var(--ink3);margin-bottom:10px;font-style:italic}
.comment-bubble{padding:9px 11px;border-radius:var(--rsm);margin-bottom:7px;font-size:12px;line-height:1.55;word-break:break-word}
.comment-bubble.dev-comment{background:var(--surface2);border-left:3px solid var(--border2)}
.comment-bubble.lead-comment{background:var(--amber-bg);border-left:3px solid #e6a817}
.comment-meta{display:flex;align-items:center;gap:6px;margin-bottom:4px}
.c-role{font-size:10px;padding:1px 7px;border-radius:8px;font-weight:600;text-transform:uppercase;letter-spacing:.3px}
.c-role.dev{background:var(--blue-bg);color:var(--blue)}
.c-role.lead{background:var(--amber-bg);color:var(--amber)}
.c-author{font-size:11px;font-weight:600;color:var(--ink)}
.c-time{font-size:10px;color:var(--ink3);font-family:'DM Mono',monospace;margin-left:auto}
.comment-input-row{display:flex;gap:8px;align-items:flex-end;margin-top:4px}
.comment-input-row textarea{flex:1;border:1px solid var(--border);border-radius:var(--rsm);padding:8px 10px;font-size:12px;font-family:'DM Sans',sans-serif;background:var(--surface2);color:var(--ink);resize:none;height:50px;outline:none;transition:border-color .15s}
.comment-input-row textarea:focus{border-color:var(--border2)}
.btn-submit{padding:0 16px;background:var(--ink);color:#fff;border:none;border-radius:var(--rsm);font-family:'DM Sans',sans-serif;font-size:12px;font-weight:500;cursor:pointer;height:50px;white-space:nowrap;flex-shrink:0}
.btn-submit:hover{opacity:.8}

.stats-row{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:8px;margin-bottom:1.5rem}
.stat{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:12px 14px}
.stat-n{font-size:24px;font-weight:600;letter-spacing:-.5px;font-family:'DM Mono',monospace}
.stat-l{font-size:11px;color:var(--ink3);margin-top:3px;font-weight:500;text-transform:uppercase;letter-spacing:.5px}

.report-dev{margin-bottom:12px;background:var(--surface);border:1px solid var(--border);border-radius:var(--r);overflow:hidden}
.report-dev-hdr{display:flex;align-items:center;gap:10px;padding:12px 16px;background:var(--surface2);border-bottom:1px solid var(--border)}
.report-task{display:flex;align-items:flex-start;gap:10px;padding:10px 16px;border-bottom:1px solid var(--border)}
.report-task:last-child{border-bottom:none}
.report-task-info{flex:1;min-width:0}
.report-task-title{font-size:13px;font-weight:500}
.report-task-meta{font-size:11px;color:var(--ink3);font-family:'DM Mono',monospace;margin-top:2px}
.report-cmt{font-size:12px;margin-top:5px;padding:5px 9px;border-radius:4px;line-height:1.45}
.report-cmt.dev{background:var(--surface2);color:var(--ink2);border-left:2px solid var(--border2)}
.report-cmt.lead{background:var(--amber-bg);color:var(--amber);border-left:2px solid #e6a817}

/* TEAM */
.team-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:14px 16px;margin-bottom:8px;display:flex;align-items:center;gap:12px}
.team-card-info{flex:1}
.team-card-name{font-size:14px;font-weight:500}
.team-card-role{font-size:12px;color:var(--ink3);margin-top:2px}
.btn-danger{padding:6px 12px;border:1px solid #f0c0c0;border-radius:var(--rsm);background:transparent;font-family:'DM Sans',sans-serif;font-size:12px;color:var(--red);cursor:pointer;transition:all .15s}
.btn-danger:hover{background:var(--red-bg)}
.add-member-box{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:18px;margin-top:1rem}
.add-member-box h3{font-size:13px;font-weight:600;margin-bottom:14px;color:var(--ink)}
.form-row{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:12px}
.form-group{display:flex;flex-direction:column;gap:5px;flex:1;min-width:120px}
.form-group label{font-size:11px;font-weight:600;color:var(--ink3);text-transform:uppercase;letter-spacing:.5px}
.form-group input{height:36px;border:1px solid var(--border);border-radius:var(--rsm);padding:0 10px;font-size:13px;font-family:'DM Sans',sans-serif;background:var(--surface2);color:var(--ink);outline:none}
.form-group input:focus{border-color:var(--border2)}
.color-label{font-size:11px;font-weight:600;color:var(--ink3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px;display:block}
.color-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px}
.color-swatch{width:26px;height:26px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:all .15s}
.color-swatch.selected{border-color:var(--ink);transform:scale(1.2)}

.action-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:1.25rem}
.outline-btn{padding:7px 14px;border:1px solid var(--border2);border-radius:var(--rsm);background:transparent;font-family:'DM Sans',sans-serif;font-size:12px;font-weight:500;color:var(--ink2);cursor:pointer;transition:all .15s}
.outline-btn:hover{background:var(--surface3);color:var(--ink)}
.outline-btn.primary{background:var(--ink);color:#fff;border-color:var(--ink)}
.outline-btn.primary:hover{opacity:.85}
.week-tabs{display:flex;gap:6px;margin-bottom:1.25rem;overflow-x:auto;padding-bottom:4px}
.wt{padding:6px 14px;border-radius:20px;border:1px solid var(--border);background:transparent;font-size:12px;font-family:'DM Mono',monospace;cursor:pointer;color:var(--ink2);white-space:nowrap;transition:all .15s}
.wt.on{background:var(--ink);color:#fff;border-color:var(--ink)}
.lead-badge{display:inline-block;background:var(--amber-bg);color:var(--amber);font-size:10px;font-weight:600;padding:2px 7px;border-radius:10px;letter-spacing:.4px;text-transform:uppercase;margin-left:6px;vertical-align:middle}
.empty-state{text-align:center;padding:3rem 1rem;color:var(--ink3);font-size:13px}
.toast{position:fixed;bottom:1.5rem;right:1.5rem;background:var(--ink);color:#fff;padding:10px 16px;border-radius:var(--r);font-size:13px;opacity:0;transition:opacity .3s;pointer-events:none;z-index:100}
.toast.show{opacity:1}

/* ══ SPRINT VIEW ══ */
.sprint-header{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:16px 18px;margin-bottom:1.25rem}
.sprint-title-row{display:flex;align-items:center;gap:12px;margin-bottom:12px;flex-wrap:wrap}
.sprint-title{font-size:16px;font-weight:600;letter-spacing:-.2px;flex:1}
.sprint-dates{font-size:12px;color:var(--ink3);font-family:'DM Mono',monospace}
.sprint-badge{font-size:11px;padding:3px 10px;border-radius:20px;font-weight:600;background:var(--blue-bg);color:var(--blue)}
.sprint-progress-row{display:flex;align-items:center;gap:10px}
.sprint-prog-bar{flex:1;height:6px;background:var(--border);border-radius:3px;overflow:hidden}
.sprint-prog-fill{height:100%;border-radius:3px;background:var(--green);transition:width .5s}
.sprint-prog-lbl{font-size:12px;font-family:'DM Mono',monospace;color:var(--ink2);white-space:nowrap}
.sprint-stats{display:grid;grid-template-columns:repeat(5,minmax(0,1fr));gap:8px;margin-bottom:1.25rem}
.sprint-stat{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:10px 12px;text-align:center}
.sprint-stat-n{font-size:20px;font-weight:600;font-family:'DM Mono',monospace;letter-spacing:-.5px}
.sprint-stat-l{font-size:10px;color:var(--ink3);margin-top:2px;font-weight:500;text-transform:uppercase;letter-spacing:.5px}
.sprint-dev-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);margin-bottom:10px;overflow:hidden}
.sprint-dev-hdr{display:flex;align-items:center;gap:10px;padding:12px 16px;background:var(--surface2);border-bottom:1px solid var(--border);cursor:pointer;user-select:none}
.sprint-dev-hdr:hover{background:var(--surface3)}
.sprint-dev-tasks{padding:12px 16px}
.sprint-task-row{display:flex;align-items:center;gap:10px;padding:7px 0;border-bottom:1px solid var(--border)}
.sprint-task-row:last-child{border-bottom:none}
.sprint-task-title{flex:1;font-size:13px;font-weight:500;line-height:1.4}
.sprint-task-meta{font-size:11px;color:var(--ink3);font-family:'DM Mono',monospace;margin-top:1px}
.sprint-day-tabs{display:flex;gap:6px;margin-bottom:1.25rem;overflow-x:auto;padding-bottom:4px;flex-wrap:wrap}
.sdt{padding:5px 12px;border-radius:20px;border:1px solid var(--border);background:transparent;font-size:11px;font-family:'DM Mono',monospace;cursor:pointer;color:var(--ink2);white-space:nowrap;transition:all .15s}
.sdt.on{background:var(--ink);color:#fff;border-color:var(--ink)}
.sdt.today-tab{border-color:var(--blue);color:var(--blue)}
.sdt.today-tab.on{background:var(--blue);color:#fff;border-color:var(--blue)}
.sprint-nav{display:flex;align-items:center;gap:10px;margin-bottom:1.25rem}
.sprint-nav-btn{padding:6px 14px;border:1px solid var(--border2);border-radius:var(--rsm);background:transparent;font-size:12px;font-family:'DM Sans',sans-serif;cursor:pointer;color:var(--ink2);transition:all .15s}
.sprint-nav-btn:hover{background:var(--surface3);color:var(--ink)}
.sprint-nav-label{font-size:13px;font-weight:500;flex:1;text-align:center}

/* ══ ATTENDANCE VIEW ══ */
.att-header{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:14px 18px;margin-bottom:1.25rem;display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.att-header-title{font-size:15px;font-weight:600;flex:1}
.att-week-nav{display:flex;align-items:center;gap:8px}
.att-week-lbl{font-size:12px;font-family:'DM Mono',monospace;color:var(--ink2);min-width:140px;text-align:center}
.att-nav-btn{width:28px;height:28px;border:1px solid var(--border);border-radius:6px;background:transparent;font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--ink2);transition:all .15s}
.att-nav-btn:hover{background:var(--surface3);color:var(--ink)}
.att-table-wrap{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);overflow:auto;margin-bottom:1.25rem}
.att-table{width:100%;border-collapse:collapse;min-width:600px}
.att-table th{padding:10px 12px;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:var(--ink3);border-bottom:1px solid var(--border);background:var(--surface2);white-space:nowrap;text-align:left}
.att-table th.day-col{text-align:center;min-width:90px}
.att-table td{padding:10px 12px;border-bottom:1px solid var(--border);vertical-align:middle}
.att-table tr:last-child td{border-bottom:none}
.att-table tr:hover td{background:var(--surface2)}
.att-dev-cell{display:flex;align-items:center;gap:8px}
.att-dev-name{font-size:13px;font-weight:500}
.att-status-cell{text-align:center}
.att-btn{padding:4px 10px;border-radius:20px;border:1.5px solid transparent;font-size:11px;font-family:'DM Sans',sans-serif;font-weight:600;cursor:pointer;transition:all .15s;white-space:nowrap;min-width:80px;display:inline-block;text-align:center}
.att-present{background:var(--green-bg);color:var(--green);border-color:var(--green)}
.att-wfh{background:var(--blue-bg);color:var(--blue);border-color:var(--blue)}
.att-absent{background:var(--red-bg);color:var(--red);border-color:var(--red)}
.att-sick{background:#f3e8ff;color:#6b21a8;border-color:#6b21a8}
.att-planned{background:#ffedd5;color:#9a3412;border-color:#9a3412}
.att-half{background:var(--amber-bg);color:var(--amber);border-color:var(--amber)}
.att-none{background:var(--surface3);color:var(--ink3);border-color:var(--border)}
.att-dropdown{position:relative;display:inline-block}
.att-dropdown-menu{position:absolute;top:calc(100% + 4px);left:50%;transform:translateX(-50%);background:var(--surface);border:1px solid var(--border);border-radius:var(--rsm);box-shadow:0 4px 16px rgba(0,0,0,.08);z-index:50;min-width:130px;overflow:hidden;display:none}
.att-dropdown.open .att-dropdown-menu{display:block}
.att-opt{padding:8px 14px;font-size:12px;font-family:'DM Sans',sans-serif;cursor:pointer;transition:background .1s;white-space:nowrap}
.att-opt:hover{background:var(--surface2)}
.att-summary{display:grid;grid-template-columns:repeat(6,minmax(0,1fr));gap:6px;margin-bottom:1.5rem}
.att-sum-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--rsm);padding:8px 10px;text-align:center}

.kanban-col{flex:0 0 220px;min-width:220px;display:flex;flex-direction:column;gap:8px}
.kanban-col-header{display:flex;align-items:center;gap:8px;padding:8px 12px;border-radius:var(--r);background:var(--surface);border:1px solid var(--border);position:sticky;top:0}
.kanban-col-title{font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;flex:1}

.swimlane-name{font-size:13px;font-weight:600}
.swimlane-count{font-size:11px;color:var(--ink3);font-family:'DM Mono',monospace}
.kanban-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:10px 12px;cursor:pointer;transition:all .15s;position:relative}
.kanban-card:hover{border-color:var(--border2);box-shadow:0 2px 8px rgba(0,0,0,.06);transform:translateY(-1px)}
.kanban-card.priority-high{border-left:3px solid #e53e3e}
.kanban-card.priority-medium{border-left:3px solid #e6a817}
.kanban-card.priority-low{border-left:3px solid #2d7a4f}
.kc-title{font-size:12px;font-weight:500;line-height:1.45;margin-bottom:7px;word-break:break-word}
.kc-footer{display:flex;align-items:center;gap:5px;flex-wrap:wrap}
.kc-mod{font-size:10px;color:var(--ink3);font-family:'DM Mono',monospace;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.kc-move{display:flex;gap:3px;margin-left:auto}
.kc-mv-btn{width:20px;height:20px;border:1px solid var(--border);border-radius:4px;background:transparent;font-size:10px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--ink3);transition:all .1s;flex-shrink:0}
.kc-mv-btn:hover{background:var(--surface2);color:var(--ink);border-color:var(--border2)}
.kanban-empty{font-size:12px;color:var(--ink3);text-align:center;padding:16px 8px;border:1.5px dashed var(--border);border-radius:var(--r);font-style:italic}

@media(max-width:600px){
  .stats-row{grid-template-columns:repeat(2,1fr)}

/* ── NEW COMMENT BADGE ── */
.comment-badge{display:inline-flex;align-items:center;justify-content:center;background:#e53e3e;color:#fff;font-size:9px;font-weight:700;border-radius:10px;padding:1px 5px;min-width:16px;height:16px;font-family:'DM Mono',monospace;line-height:1;flex-shrink:0}
.has-new-comment{position:relative}
.tab-badge{display:inline-flex;align-items:center;justify-content:center;background:#e53e3e;color:#fff;font-size:9px;font-weight:700;border-radius:10px;padding:1px 5px;min-width:14px;height:14px;margin-left:5px;font-family:'DM Mono',monospace;vertical-align:middle}

.overdue-banner{background:#fdeaea;border:1px solid #f0c0c0;border-radius:var(--rsm);padding:8px 12px;margin-bottom:1rem;font-size:12px;color:#a02020;display:flex;align-items:center;gap:8px}

.carryover-banner{background:var(--blue-bg);border:1px solid #b3cff5;border-radius:var(--rsm);padding:10px 14px;margin-bottom:1rem;font-size:12px;color:var(--blue);display:flex;align-items:center;gap:10px;flex-wrap:wrap}

.btn-carryover{padding:4px 12px;border:1px solid var(--blue);border-radius:var(--rsm);background:transparent;font-family:'DM Sans',sans-serif;font-size:11px;font-weight:600;color:var(--blue);cursor:pointer;transition:all .15s;white-space:nowrap}

.btn-dismiss:hover{color:var(--ink)}

/* ══ STANDUP TIMER ══ */
.timer-pill{display:flex;align-items:center;gap:7px;padding:5px 11px;border:1px solid var(--border);border-radius:20px;background:var(--surface2);cursor:pointer;user-select:none;transition:all .2s;flex-shrink:0}
.timer-pill:hover{background:var(--surface3)}
.timer-pill.running{border-color:#b3cff5;background:var(--blue-bg)}

.timer-pill.finished{border-color:#f0c0c0;background:var(--red-bg)}
@keyframes timerPulse{0%,100%{opacity:1}50%{opacity:.7}}
.timer-display{font-size:13px;font-weight:600;font-family:'DM Mono',monospace;letter-spacing:.5px;min-width:44px;text-align:center}

.timer-ctrl-btn{width:22px;height:22px;border:1px solid var(--border2);border-radius:5px;background:transparent;font-size:11px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--ink2);transition:all .1s;flex-shrink:0;padding:0}

.timer-modal{background:var(--surface);border-radius:16px;padding:2rem;width:320px;max-width:90vw;text-align:center;box-shadow:0 8px 40px rgba(0,0,0,.15);transform:translateY(10px);transition:transform .2s}
.timer-modal-overlay.open .timer-modal{transform:translateY(0)}
.timer-big{font-size:64px;font-weight:600;font-family:'DM Mono',monospace;letter-spacing:2px;line-height:1;margin:1rem 0;transition:color .3s}
.timer-big.warning{color:var(--red)}
.timer-big.done{color:var(--green)}
.timer-modal h3{font-size:14px;font-weight:600;color:var(--ink2);margin-bottom:4px}
.timer-modal-sub{font-size:12px;color:var(--ink3);margin-bottom:1.5rem}
.timer-presets{display:flex;gap:8px;justify-content:center;margin-bottom:1.25rem;flex-wrap:wrap}
.preset-btn{padding:6px 14px;border:1px solid var(--border2);border-radius:20px;background:transparent;font-family:'DM Sans',sans-serif;font-size:12px;font-weight:500;cursor:pointer;color:var(--ink2);transition:all .15s}
.preset-btn:hover,.preset-btn.active{background:var(--ink);color:#fff;border-color:var(--ink)}
.timer-main-btn{width:100%;padding:11px;border:none;border-radius:var(--r);font-family:'DM Sans',sans-serif;font-size:14px;font-weight:600;cursor:pointer;transition:all .15s;margin-bottom:8px}
.timer-main-btn.start{background:var(--ink);color:#fff}
.timer-main-btn.start:hover{opacity:.85}
.timer-main-btn.pause{background:var(--amber-bg);color:var(--amber);border:1px solid #e6a817}
.timer-main-btn.resume{background:var(--blue-bg);color:var(--blue);border:1px solid var(--blue)}
.timer-secondary-btn{width:100%;padding:8px;border:1px solid var(--border2);border-radius:var(--r);background:transparent;font-family:'DM Sans',sans-serif;font-size:13px;color:var(--ink2);cursor:pointer;transition:all .15s}
.timer-secondary-btn:hover{background:var(--surface3);color:var(--ink)}

/* ══ CLOSED TASKS VIEW ══ */
.closed-header{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:14px 18px;margin-bottom:1.25rem;display:flex;align-items:center;gap:12px;flex-wrap:wrap}

    </div>

    <!-- ATTENDANCE -->

      <div id="attendance-content"></div>
    </div>

    <!-- KANBAN -->
    <div class="view" id="v-kanban">
      <div id="kanban-content"></div>
    </div>

    <!-- REPORT -->
    <div class="view" id="v-report">
      <div class="action-row">
        <button class="outline-btn primary" onclick="copyReport()">Copy today's report</button>
        <button class="outline-btn primary" onclick="copyWeeklySummary()" style="background:var(--blue);border-color:var(--blue)">Copy weekly summary</button>
        <button class="outline-btn" onclick="renderReport()">Refresh</button>

    </div>

    <div class="view" id="v-closed">

    </div>

    <!-- HISTORY -->
    <div class="view" id="v-history">
      <div class="section-label">Past 7 days</div>
      <div class="week-tabs" id="week-tabs"></div>
      <div id="history-body"></div>
    </div>

    <!-- TEAM -->
    <div class="view" id="v-team">
      <div class="section-label">Team members</div>
      <div id="team-list"></div>

</div>

const isWeekend=dateStr=>{const d=new Date(dateStr+'T12:00:00');return d.getDay()===0||d.getDay()===6;};

// ══ SPRINT helpers ══
function getSprintDates(offset=0){
  // Sprint starts from a fixed anchor Monday, 14-day sprints
  const anchor=new Date('2025-01-06'); // first Monday of 2025 as anchor
  const today=new Date();
  const daysSinceAnchor=Math.floor((today-anchor)/(86400000));
  const currentSprintNum=Math.floor(daysSinceAnchor/SPRINT_DURATION_DAYS);
  const sprintNum=currentSprintNum+offset;
  const startMs=anchor.getTime()+(sprintNum*SPRINT_DURATION_DAYS*86400000);
  const start=new Date(startMs);
  const end=new Date(startMs+(SPRINT_DURATION_DAYS-1)*86400000);
  const fmt=d=>d.toISOString().slice(0,10);
  return{start:fmt(start),end:fmt(end),sprintNum:sprintNum+1};
}
function getSprintWorkDays(offset=0){
  const{start,end}=getSprintDates(offset);
  const days=[];
  let cur=start;
  while(cur<=end){if(!isWeekend(cur))days.push(cur);cur=addDays(cur,1);}
  return days;
}

// ══ ATTENDANCE helpers ══
function getWeekDates(offset=0){
  const today=new Date();
  const dow=today.getDay(); // 0=Sun
  const monday=new Date(today);
  monday.setDate(today.getDate()-(dow===0?6:dow-1)+(offset*7));
  const days=[];
  for(let i=0;i<5;i++){const d=new Date(monday);d.setDate(monday.getDate()+i);days.push(d.toISOString().slice(0,10));}
  return days;
}

// ══ SUPABASE ══
async function dbLoad(date){
  setSyncStatus('loading');
  try{
    const r=await fetch(`${SUPABASE_URL}/rest/v1/tasks?date=eq.${date}&select=data`,{headers:H});
    const rows=await r.json();
    setSyncStatus('ok');
    return rows&&rows.length>0?rows[0].data:null;
  }catch(e){setSyncStatus('err');return null;}
}
async function dbSave(date,data,rowId){
  setSyncStatus('loading');
  try{
    await fetch(`${SUPABASE_URL}/rest/v1/tasks`,{
      method:'POST',
      headers:{...H,'Prefer':'resolution=merge-duplicates'},
      body:JSON.stringify({id:rowId||dateToId(date),date,data,updated_at:new Date().toISOString()})
    });
    setSyncStatus('ok');
  }catch(e){setSyncStatus('err');showToast('Sync failed');}
}
async function loadToday(){
  const remote=await dbLoad(todayKey());
  if(remote){
    tasks=remote.map(t=>({...t,comments:t.comments||[]}));
  } else {
    // Check yesterday for carry-over
    const yest=new Date();yest.setDate(yest.getDate()-1);
    const yesterdayKey=yest.toISOString().slice(0,10);
    const yesterday=await dbLoad(yesterdayKey);
    if(yesterday){
      const incomplete=yesterday.filter(t=>t.st!=='done');
      if(incomplete.length>0){
        window._carryoverCount=incomplete.length;
        window._carryoverTasks=incomplete.map(t=>({...t,comments:t.comments||[],_carriedOver:true}));
        tasks=JSON.parse(JSON.stringify(DEFAULT_TASKS));
      } else {
        tasks=JSON.parse(JSON.stringify(DEFAULT_TASKS));
      }
    } else {
      tasks=JSON.parse(JSON.stringify(DEFAULT_TASKS));
    }
    await dbSave(todayKey(),tasks);
  }
  renderAll();
  checkOverdue();
  updateTabBadges();
  if(window._carryoverCount>0) showCarryoverBanner();
}
function showCarryoverBanner(){
  const el=document.getElementById('carryover-banner');
  if(!el)return;
  const n=window._carryoverCount;
  el.innerHTML=`<div class="carryover-banner">
    <span>📋</span>
    <span><strong>${n} unfinished task${n>1?'s':''}</strong> from yesterday — carry them over?</span>
    <button class="btn-carryover" onclick="applyCarryover()">Yes, carry over</button>
    <button class="btn-dismiss" onclick="dismissCarryover()">Dismiss</button>
  </div>`;
}
async function applyCarryover(){
  const carried=window._carryoverTasks||[];
  // merge: avoid duplicates by title
  const existing=new Set(tasks.map(t=>t.title.trim().toLowerCase()));
  let added=0;
  carried.forEach(t=>{
    if(!existing.has(t.title.trim().toLowerCase())){
      const nt={...t,id:nid++,st:'todo',_carriedOver:undefined};
      delete nt._carriedOver;
      tasks.push(nt);added++;
    }
  });
  window._carryoverCount=0;window._carryoverTasks=[];
  const el=document.getElementById('carryover-banner');if(el)el.innerHTML='';
  await saveAndSync();
  renderMorning();
  showToast(`${added} task${added!==1?'s':''} carried over ✓`);
}
function dismissCarryover(){
  window._carryoverCount=0;window._carryoverTasks=[];
  const el=document.getElementById('carryover-banner');if(el)el.innerHTML='';
}
async function saveAndSync(){
  await dbSave(todayKey(),tasks);
  showToast('Saved & synced ✓');
}

// ══ OVERDUE ══
function isOverdue(t){
  // Flag EOD tasks that are not done/blocked, after 5pm
  const h=new Date().getHours();
  return (t.dl==='EOD'||t.dl==='First half')&&t.st!=='done'&&t.st!=='blocked'&&(
    (t.dl==='EOD'&&h>=17)||(t.dl==='First half'&&h>=13)
  );
}
function checkOverdue(){
  const el=document.getElementById('overdue-banner');if(!el)return;
  const overdue=tasks.filter(isOverdue);
  if(!overdue.length){el.innerHTML='';return;}
  el.innerHTML=`<div class="overdue-banner">⚠️ <strong>${overdue.length} overdue task${overdue.length>1?'s':''}</strong> — tasks past their deadline that aren't done yet.</div>`;
}

  tasks.push({id:nid++,title:t,dev:document.getElementById('ds').value,mod:'',pri:document.getElementById('ps').value,dl:document.getElementById('dl').value,st:'todo',comments:[]});
  document.getElementById('ti').value='';

async function removeTask(id){tasks=tasks.filter(t=>t.id!==id);renderMorning();await saveAndSync();}
function renderMorning(){
  const isLead=currentRole==='lead';
  const list=document.getElementById('task-list');
  document.getElementById('morning-lbl').textContent=`Task assignments · ${tasks.length} total`;
  if(!tasks.length){list.innerHTML='<div class="empty-state">No tasks assigned yet.</div>';return;}
  // sort by priority within each dev
  const priOrder={high:0,medium:1,low:2};
  let h='';
  DEVS.forEach(dev=>{
    const dt=tasks.filter(t=>t.dev===dev.id).sort((a,b)=>(priOrder[a.pri]||1)-(priOrder[b.pri]||1));
    if(!dt.length)return;
    const done=dt.filter(t=>t.st==='done').length,pct=Math.round(done/dt.length*100);
    h+=`<div class="dev-section"><div class="dev-hdr">
      <div class="av" style="background:${dev.bg};color:${dev.tc}">${dev.i}</div>
      <div><div class="dev-name-lbl">${dev.name}</div><div class="prog-bar-wrap" style="width:80px"><div class="prog-bar-fill" style="width:${pct}%"></div></div></div>
      <span class="dev-meta">${done}/${dt.length} done</span></div>`;
    dt.forEach(t=>{
      const tOverdue=isOverdue(t);
      h+=`<div class="task-card priority-${t.pri}${t.st==='done'?' done-card':''}${tOverdue?' overdue-card':''}"><div class="task-left">
        <div class="task-title">${t.title}</div>${t.mod?`<div class="task-mod">${t.mod}</div>`:''}
        <div class="task-tags"><span class="tag ${pcls(t.pri)}">${t.pri==='high'?'🔴 High':t.pri==='medium'?'🟡 Medium':'🟢 Low'}</span><span class="tag ${dlcls(t.dl)}">${t.dl}</span><span class="tag ${scls(t.st)}">${slbl(t.st)}</span>${tOverdue?'<span class="overdue-badge">⚠️ Overdue</span>':''}</div>
      </div>${isLead?`<button class="remove-btn" onclick="removeTask(${t.id})">×</button>`:''}</div>`;
    });
    h+='</div>';
  });
  list.innerHTML=h;
  checkOverdue();
}

function renderSprint(){

  const{start,end,sprintNum}=getSprintDates(currentSprintOffset);

  const today=todayKey();
  const isCurrent=currentSprintOffset===0;

  // sprint-level task stats (tasks from DB — using today's tasks as proxy for current sprint)
  const allTasks=tasks;
  const cnt={todo:0,inprogress:0,done:0,blocked:0,high:0,medium:0,low:0};
  allTasks.forEach(t=>{cnt[t.st]=(cnt[t.st]||0)+1;cnt[t.pri]=(cnt[t.pri]||0)+1;});

function renderAttendance(){

  const weekStart=weekDays[0],weekEnd=weekDays[4];

  // Summary counts for this week
  const sumCounts={present:0,wfh:0,absent:0,sick:0,planned:0,half:0};
  weekDays.forEach(d=>{
    DEVS.forEach(dev=>{

  });

  let h=`<div class="att-header">

      <button class="att-nav-btn" onclick="currentAttWeekOffset--;renderAttendance()">‹</button>

  h+=`<div class="att-summary">

    </tr></thead>
    <tbody>`;

  DEVS.forEach(dev=>{
    h+=`<tr><td><div class="att-dev-cell"><div class="av" style="background:${dev.bg};color:${dev.tc};width:28px;height:28px;font-size:10px">${dev.i}</div><span class="att-dev-name">${dev.name}</span></div></td>`;
    weekDays.forEach(d=>{
      const status=(attendance[d]||{})[dev.id]||null;
      const canEdit=isLead||(currentRole===dev.id&&d===today);
      const lbl=status?attLbl(status):'—';
      const cls=status?attCls(status):'att-none';
      if(canEdit){
        h+=`<td class="att-status-cell"><div class="att-dropdown" id="dd-${dev.id}-${d}">
          <button class="att-btn ${cls}" onclick="toggleAttDropdown('${dev.id}','${d}')">${lbl}</button>

async function copyWeeklySummary(){
  const el=document.getElementById('weekly-loading');
  if(el)el.style.display='block';
  const keys=[];
  // Get Mon-Fri of current week
  const today=new Date();
  const dow=today.getDay();
  const monday=new Date(today);monday.setDate(today.getDate()-(dow===0?6:dow-1));
  for(let i=0;i<5;i++){const d=new Date(monday);d.setDate(monday.getDate()+i);keys.push(d.toISOString().slice(0,10));}
  const days=[];
  for(const k of keys){
    const data=await dbLoad(k);
    if(data)days.push({key:k,data});
    else if(k===todayKey()&&tasks.length)days.push({key:k,data:tasks});
  }
  if(el)el.style.display='none';
  if(!days.length){showToast('No data found for this week');return;}
  const weekStart=fmtDate(keys[0]),weekEnd=fmtDate(keys[keys.length-1]);
  let txt=`WEEKLY SUMMARY — ${weekStart} to ${weekEnd}\n${'═'.repeat(55)}\n\n`;
  // Overall stats
  let allTasks=[];days.forEach(d=>allTasks=allTasks.concat(d.data));
  const totalDays=days.length;
  txt+=`Days tracked: ${totalDays}/5\n\n`;
  // Per developer
  DEVS.forEach(dev=>{
    const devDays=days.map(d=>({date:d.key,tasks:d.data.filter(t=>t.dev===dev.id)})).filter(d=>d.tasks.length);
    if(!devDays.length)return;
    txt+=`${dev.name}\n${'─'.repeat(40)}\n`;
    devDays.forEach(dd=>{
      const cnt={done:0,inprogress:0,todo:0,blocked:0};
      dd.tasks.forEach(t=>cnt[t.st]=(cnt[t.st]||0)+1);
      txt+=`  ${fmtDate(dd.date)}: ${dd.tasks.length} tasks — ${cnt.done} done, ${cnt.inprogress} in progress${cnt.blocked?' ⚠️ '+cnt.blocked+' blocked':''}\n`;
      dd.tasks.filter(t=>t.st==='blocked').forEach(t=>{txt+=`    🚫 BLOCKED: ${t.title}\n`;});
    });
    // completion rate across week
    const allDev=devDays.flatMap(d=>d.tasks);
    const doneTotal=allDev.filter(t=>t.st==='done').length;
    const rate=allDev.length?Math.round(doneTotal/allDev.length*100):0;
    txt+=`  Completion rate: ${doneTotal}/${allDev.length} (${rate}%)\n\n`;
  });
  // Blockers summary
  const allBlocked=[];days.forEach(d=>d.data.filter(t=>t.st==='blocked').forEach(t=>allBlocked.push({...t,date:d.key})));
  if(allBlocked.length){
    txt+=`BLOCKERS THIS WEEK\n${'─'.repeat(40)}\n`;
    allBlocked.forEach(t=>{txt+=`  ⚠️  [${fmtDate(t.date)}] ${devById(t.dev).name}: ${t.title}\n`;});
    txt+='\n';
  }
  navigator.clipboard.writeText(txt).then(()=>showToast('Weekly summary copied! ✓'));
}

async function renderClosed(){
  const el=document.getElementById('closed-content');
  el.innerHTML='<div class="closed-empty">Loading…</div>';

  for(let i=1;i<=14;i++){

  }

  // load all days in parallel
  const results=await Promise.all(keys.map(async k=>({key:k,data:await dbLoad(k)})));
  const available=results.filter(r=>r.data&&r.data.length>0);

  if(!available.length){
    el.innerHTML='<div class="closed-empty">No closed tasks yet. Past days will appear here once tasks are completed.</div>';
    return;
  }

  const isLead=currentRole==='lead';

  // Build day tabs
  let h=`<div class="closed-header">
    <span class="closed-header-title">Closed Tasks</span>
    <span style="font-size:12px;color:var(--ink3)">${available.length} day${available.length!==1?'s':''} with data</span>

  h+=`<div class="closed-day-tabs">

function showClosedDay(idx, btn){
  document.querySelectorAll('.closed-day-tab').forEach(b=>b.classList.remove('on'));
  if(btn) btn.classList.add('on');

  const {key, data}=window._closedData[idx];
  const isLead=currentRole==='lead';
  const priOrder={high:0,medium:1,low:2};

  // Only show tasks that are NOT todo — i.e. done, blocked, inprogress from that day
  // For non-leads, only show their own tasks
  const relevantTasks=data.filter(t=>{
    const stOk=t.st!=='todo';
    const devOk=isLead||(t.dev===currentRole);
    return stOk&&devOk;
  });

  // Summary counts
  const cnt={done:0,inprogress:0,blocked:0,inreview:0};
  relevantTasks.forEach(t=>{ if(cnt[t.st]!==undefined) cnt[t.st]++; });
  const total=relevantTasks.length;

  let h=`<div class="closed-day-summary">
    <span class="closed-sum-pill" style="background:var(--surface3);color:var(--ink2)">${total} total</span>
    ${cnt.done?`<span class="closed-sum-pill t-done">${cnt.done} done</span>`:''}
    ${cnt.inprogress?`<span class="closed-sum-pill t-prog">${cnt.inprogress} in progress</span>`:''}
    ${cnt.blocked?`<span class="closed-sum-pill t-block">${cnt.blocked} blocked</span>`:''}
  </div>`;

  if(!total){
    h+=`<div class="closed-empty">No closed tasks for this day.</div>`;
    document.getElementById('closed-day-body').innerHTML=h;
    return;
  }

  // Group by developer
  DEVS.forEach(dev=>{
    const devTasks=relevantTasks
      .filter(t=>t.dev===dev.id)
      .sort((a,b)=>{
        // done last, blocked first
        const order={blocked:0,inprogress:1,inreview:2,done:3};
        return (order[a.st]||1)-(order[b.st]||1) || (priOrder[a.pri]||1)-(priOrder[b.pri]||1);
      });
    if(!devTasks.length) return;

    h+=`<div class="closed-dev-group">
      <div class="closed-dev-hdr">
        <div class="av" style="background:${dev.bg};color:${dev.tc};width:26px;height:26px;font-size:10px">${dev.i}</div>
        <span style="font-size:13px;font-weight:600">${dev.name}</span>
        <span style="font-size:11px;color:var(--ink3);font-family:'DM Mono',monospace;margin-left:auto">${devTasks.filter(t=>t.st==='done').length}/${devTasks.length} done</span>
      </div>`;

    devTasks.forEach(t=>{
      h+=`<div class="closed-task-row st-${t.st}">
        <div style="flex:1;min-width:0">
          <div class="closed-task-title">${t.title}</div>
          <div class="closed-task-meta">${t.mod||''}${t.mod&&t.dl?' · ':''}${t.dl||''}</div>
          ${(t.comments&&t.comments.length)?`<div style="font-size:11px;color:var(--ink3);margin-top:4px">💬 ${t.comments.length} comment${t.comments.length>1?'s':''}</div>`:''}
        </div>
        <div style="display:flex;flex-direction:column;align-items:flex-end;gap:5px;flex-shrink:0">
          <span class="tag ${scls(t.st)}">${slbl(t.st)}</span>
          <span class="tag ${pcls(t.pri)}" style="font-size:10px">${t.pri==='high'?'🔴':t.pri==='medium'?'🟡':'🟢'} ${t.pri}</span>
        </div>
      </div>`;
    });
    h+=`</div>`;
  });

  document.getElementById('closed-day-body').innerHTML=h;
}

// ══ NEW COMMENT BADGES ══
function getSeenKey(taskId){ return `seen_${todayKey()}_${taskId}_${currentRole}`; }
function getLastSeen(taskId){
  try{ return parseInt(localStorage.getItem(getSeenKey(taskId))||'0'); }catch(e){return 0;}
}
function markSeen(taskId){
  try{ localStorage.setItem(getSeenKey(taskId), Date.now()); }catch(e){}
}
function newCommentCount(task){
  const lastSeen=getLastSeen(task.id);
  const cmts=task.comments||[];
  // count comments from the OTHER role that are newer than lastSeen
  const isLead=currentRole==='lead';
  return cmts.filter(c=>(isLead?c.role==='dev':c.role==='lead')&&(c.time||0)>lastSeen).length;
}
function updateTabBadges(){
  // Show red dot on Progress tab if any task has new lead comments for dev
  const total=tasks.reduce((s,t)=>s+newCommentCount(t),0);
  document.querySelectorAll('.tb').forEach(btn=>{
    // remove old badge
    btn.querySelectorAll('.tab-badge').forEach(b=>b.remove());
    const v=btn.getAttribute('onclick')?.match(/showView\('(\w+)'/)?.[1];
    if((v==='progress'||v==='kanban')&&total>0){
      btn.insertAdjacentHTML('beforeend',`<span class="tab-badge">${total}</span>`);
    }
  });
}

  await saveAndSync();
}

function renderKanban(){
  const isLead=currentRole==='lead';
  const showDevs=kbFilter==='all'?DEVS:DEVS.filter(d=>d.id===kbFilter);

  // Priority filter buttons
  let h=`<div class="kanban-toolbar">
    <div class="kanban-filter">
      <button class="kf-btn${kbFilter==='all'?' active':''}" onclick="kbFilter='all';renderKanban()">All</button>
      ${DEVS.map(d=>`<button class="kf-btn${kbFilter===d.id?' active':''}" onclick="kbFilter='${d.id}';renderKanban()">
        <span style="display:inline-block;width:10px;height:10px;border-radius:50%;background:${d.bg};border:1.5px solid ${d.tc};margin-right:4px;vertical-align:middle"></span>${d.name}
      </button>`).join('')}
    </div>
  </div>`;

  // Board: one set of 5 columns per swimlane (developer)
  h+=`<div style="overflow-x:auto;padding-bottom:1rem">`;

  showDevs.forEach(dev=>{
    const devTasks=tasks.filter(t=>t.dev===dev.id);
    if(!isLead && dev.id!==currentRole && kbFilter==='all') return;

    h+=`<div class="kanban-swimlane">
      <div class="swimlane-header">
        <div class="av" style="background:${dev.bg};color:${dev.tc};width:26px;height:26px;font-size:10px">${dev.i}</div>
        <span class="swimlane-name">${dev.name}</span>
        <span class="swimlane-count">${devTasks.length} task${devTasks.length!==1?'s':''}</span>
      </div>
      <div class="kanban-board">`;

    KANBAN_COLS.forEach(col=>{
      const colTasks=devTasks.filter(t=>stToCol(t.st)===col.id);
      h+=`<div class="kanban-col ${col.cls}">
        <div class="kanban-col-header">
          <span class="kanban-col-title">${col.label}</span>
          <span class="kanban-col-count">${colTasks.length}</span>
        </div>
        <div class="kanban-cards">`;

      if(colTasks.length===0){
        h+=`<div class="kanban-empty">Empty</div>`;
      } else {
        const priOrder={high:0,medium:1,low:2};
        colTasks.sort((a,b)=>(priOrder[a.pri]||1)-(priOrder[b.pri]||1)).forEach(t=>{
          // prev/next col for move buttons
          const ci=KANBAN_COLS.findIndex(c=>c.id===col.id);
          const prevCol=ci>0?KANBAN_COLS[ci-1].id:null;
          const nextCol=ci<KANBAN_COLS.length-1?KANBAN_COLS[ci+1].id:null;
          const canEdit=isLead||(currentRole===dev.id);
          h+=`<div class="kanban-card priority-${t.pri}">
            <div style="display:flex;align-items:flex-start;gap:6px">
              <div class="kc-title" style="flex:1">${t.title}</div>
              ${newCommentCount(t)>0?`<span class="comment-badge">NEW</span>`:''}
            </div>
            <div class="kc-footer">
              <span class="tag ${pcls(t.pri)}" style="font-size:10px">${t.pri==='high'?'🔴':t.pri==='medium'?'🟡':'🟢'} ${t.pri}</span>
              ${t.dl?`<span class="tag t-eod" style="font-size:10px">${t.dl}</span>`:''}
              ${t.mod?`<span class="kc-mod">${t.mod}</span>`:''}
              ${canEdit?`<div class="kc-move">
                ${prevCol?`<button class="kc-mv-btn" onclick="moveTask(${t.id},'${prevCol}')" title="Move left">←</button>`:''}
                ${nextCol?`<button class="kc-mv-btn" onclick="moveTask(${t.id},'${nextCol}')" title="Move right">→</button>`:''}
              </div>`:''}
            </div>
            ${(t.comments&&t.comments.length)?`<div style="font-size:10px;color:var(--ink3);margin-top:6px;padding-top:6px;border-top:1px solid var(--border)">💬 ${t.comments.length} comment${t.comments.length>1?'s':''}</div>`:''}
          </div>`;
        });
      }

      h+=`</div></div>`; // close kanban-cards, kanban-col
    });

    h+=`</div></div>`; // close kanban-board, kanban-swimlane
  });

  h+=`</div>`; // close overflow wrapper
  document.getElementById('kanban-content').innerHTML=h;
}


// ══ STANDUP TIMER ══
let timerTotal=15*60, timerLeft=15*60, timerRunning=false, timerInterval=null, timerPaused=false;
const RING_CIRC=389.6;

function openTimerModal(){
  document.getElementById('timer-modal-overlay').classList.add('open');
  updateTimerUI();
}
function handleOverlayClick(e){
  if(e.target===document.getElementById('timer-modal-overlay'))closeTimerModal();
}
function closeTimerModal(){
  document.getElementById('timer-modal-overlay').classList.remove('open');
}
function setPreset(mins){
  if(timerRunning)return;
  timerTotal=mins*60; timerLeft=mins*60; timerPaused=false;
  document.querySelectorAll('.preset-btn').forEach(b=>{
    b.classList.toggle('active', b.textContent===mins+' min');
  });
  updateTimerUI();
}
function timerMainAction(){
  if(!timerRunning&&!timerPaused){ startTimer(); }
  else if(timerRunning){ pauseTimer(); }
  else if(timerPaused){ resumeTimer(); }
}
function startTimer(){
  timerRunning=true; timerPaused=false;
  document.querySelectorAll('.preset-btn').forEach(b=>b.style.pointerEvents='none');
  timerInterval=setInterval(tickTimer,1000);
  updateTimerUI();
}
function pauseTimer(){
  timerRunning=false; timerPaused=true;
  clearInterval(timerInterval);
  updateTimerUI();
}
function resumeTimer(){
  timerRunning=true; timerPaused=false;
  timerInterval=setInterval(tickTimer,1000);
  updateTimerUI();
}
function resetTimer(){
  clearInterval(timerInterval);
  timerRunning=false; timerPaused=false; timerLeft=timerTotal;
  document.querySelectorAll('.preset-btn').forEach(b=>b.style.pointerEvents='');
  updateTimerUI();
}
function tickTimer(){
  if(timerLeft<=0){ finishTimer(); return; }
  timerLeft--;
  updateTimerUI();
  // warning at 5 min
  if(timerLeft===300) showToast('⚠️ 5 minutes left!');
}
function finishTimer(){
  clearInterval(timerInterval);
  timerRunning=false; timerLeft=0;
  updateTimerUI();
  // play a beep
  try{
    const ctx=new(window.AudioContext||window.webkitAudioContext)();
    [0,0.3,0.6].forEach(t=>{
      const o=ctx.createOscillator(),g=ctx.createGain();
      o.connect(g);g.connect(ctx.destination);
      o.frequency.value=880;g.gain.setValueAtTime(0.3,ctx.currentTime+t);
      g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+t+0.25);
      o.start(ctx.currentTime+t);o.stop(ctx.currentTime+t+0.3);
    });
  }catch(e){}
  showToast("⏰ Time's up! Standup over.");
  openTimerModal();
}
function fmtTimerDisplay(s){
  const m=Math.floor(s/60),sec=s%60;
  return `${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}`;
}
function updateTimerUI(){
  const disp=fmtTimerDisplay(timerLeft);
  const isWarning=timerLeft<=300&&timerLeft>0;
  const isDone=timerLeft===0&&!timerRunning&&!timerPaused&&timerTotal!==timerLeft||timerLeft===0;
  const pct=timerTotal>0?timerLeft/timerTotal:1;
  const offset=RING_CIRC*(1-pct);

  // big display
  const big=document.getElementById('timer-big');
  if(big){
    big.textContent=disp;
    big.className='timer-big'+(isDone?' done':isWarning?' warning':'');
  }
  // ring
  const ring=document.getElementById('timer-ring');
  if(ring){
    ring.setAttribute('stroke-dashoffset', offset);
    ring.style.stroke=isDone?'var(--green)':isWarning?'var(--red)':'var(--blue)';
  }
  // main button
  const btn=document.getElementById('timer-main-btn');
  if(btn){
    if(!timerRunning&&!timerPaused&&timerLeft===timerTotal){btn.textContent='▶ Start';btn.className='timer-main-btn start';}
    else if(timerRunning){btn.textContent='⏸ Pause';btn.className='timer-main-btn pause';}
    else if(timerPaused){btn.textContent='▶ Resume';btn.className='timer-main-btn resume';}
    else{btn.textContent='▶ Start';btn.className='timer-main-btn start';}
    btn.disabled=isDone&&timerLeft===0&&!timerPaused;
  }
  // pill in topbar
  const pill=document.getElementById('timer-pill');
  const pillDisp=document.getElementById('timer-display-pill');
  const pillIcon=document.getElementById('timer-icon');
  if(pillDisp) pillDisp.textContent=disp;
  if(pill){
    pill.className='timer-pill'+(timerRunning?(isWarning?' warning':' running'):isDone?' finished':'');
  }
  if(pillIcon) pillIcon.textContent=timerRunning?'⏱':isDone?'⏰':'⏱';
}

// ══ INIT ══
buildLoginGrid();
buildColorPicker();
</script>

    <p class="timer-modal-sub">Keep your standup focused and on time</p>
    <svg class="timer-progress-ring" width="140" height="140" id="timer-svg">
      <circle cx="70" cy="70" r="62" fill="none" stroke="var(--border)" stroke-width="6"/>
      <circle cx="70" cy="70" r="62" fill="none" stroke="var(--blue)" stroke-width="6"
        stroke-dasharray="389.6" stroke-dashoffset="0"
        stroke-linecap="round" transform="rotate(-90 70 70)"
        id="timer-ring" style="transition:stroke-dashoffset .9s linear,stroke .3s"/>

      <button class="preset-btn" onclick="setPreset(20)">20 min</button>
      <button class="preset-btn" onclick="setPreset(30)">30 min</button>
    </div>
    <button class="timer-main-btn start" id="timer-main-btn" onclick="timerMainAction()">▶ Start</button>
    <button class="timer-secondary-btn" onclick="resetTimer()">↺ Reset</button>
  </div>
</div>
